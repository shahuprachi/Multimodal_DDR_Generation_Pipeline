<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DDR Intelligence System</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: Poppins;
        background: #f4f6f9;
        margin: 0;
      }

      header {
        background: #1f2a44;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: 600;
      }

      .container {
        width: 85%;
        margin: auto;
        margin-top: 30px;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 25px;
      }

      .upload-box {
        border: 2px dashed #ccc;
        padding: 30px;
        text-align: center;
        border-radius: 10px;
      }

      .upload-box input {
        margin: 10px 0;
      }

      button {
        background: #007bff;
        color: white;
        padding: 12px 28px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #0056b3;
      }

      .report-section {
        white-space: pre-wrap;
        background: #f8f9fc;
        padding: 20px;
        border-radius: 10px;
        line-height: 1.6;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
      }

      .image-grid img {
        width: 100%;
        border-radius: 10px;
        box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.2);
      }

      .footer {
        text-align: center;
        padding: 20px;
        color: #777;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <header>AI-Powered DDR Intelligence System</header>

    <div class="container">
      <div class="card">
        <h2>Upload Inspection Reports</h2>

        <form method="POST" enctype="multipart/form-data">
          <div class="upload-box">
            <label>Upload Inspection PDF</label>
            <br />
            <input type="file" name="inspection" required />

            <br /><br />

            <label>Upload Thermal PDF</label>
            <br />
            <input type="file" name="thermal" required />

            <br /><br />

            <button type="submit">Generate DDR Report</button>
          </div>
        </form>
      </div>

      {% if report %}

      <div class="card">
        <h2>Generated DDR Report</h2>

        <div class="report-section">{{ report }}</div>
      </div>

      {% endif %} {% if images %}

      <div class="card">
        <h2>Extracted Evidence Images</h2>

        <div class="image-grid">
          {% for img in images %}

          <img src="{{ img }}" />

          {% endfor %}
        </div>
      </div>

      {% endif %}
    </div>

    <div class="footer">
      Multimodal Document Intelligence Pipeline | AI Generalist Assignment
    </div>
  </body>
</html>
